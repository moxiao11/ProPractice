<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>程序设计实践课程</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="程序设计实践课程：通过实验与项目掌握编程能力">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="./assets/styles/custom.css?v=20260314b">
</head>
<body>
  <div id="app"></div>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      svg: { fontCache: 'global' }
    };
  </script>

  <script>
    window.$docsify = {
      name: '程序设计实践',
      repo: '',
      themeColor: '#0ea5a4',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 2,
      coverpage: true,
      onlyCover: false,
      auto2top: true,
      search: {
        placeholder: '搜索课程内容...',
        noData: '没有找到相关内容',
        depth: 2
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
        crossChapter: true,
        crossChapterText: true
      },
      plugins: [
        function (hook) {
          hook.beforeEach(function (content) {
            return content
              .replace(/```[ \t]*C\+\+/g, '```cpp')
              .replace(/```[ \t]*c\+\+/g, '```cpp')
              .replace(/```[ \t]*Powershell/g, '```powershell');
          });

          hook.doneEach(function () {
            if (window.Prism && typeof window.Prism.highlightAll === 'function') {
              window.Prism.highlightAll();
            }
            if (window.MathJax && window.MathJax.typesetPromise) {
              window.MathJax.typesetPromise();
            }
          });
        }
      ]
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-clike.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-cpp.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-powershell.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-makefile.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-batch.min.js"></script>
  <script>
    if (window.Prism && window.Prism.languages && window.Prism.languages.cpp) {
      window.Prism.languages['c++'] = window.Prism.languages.cpp;
      window.Prism.languages['C++'] = window.Prism.languages.cpp;
    }
  </script>
  <script src="./assets/scripts/course.js?v=20260314b"></script>
</body>
</html>
